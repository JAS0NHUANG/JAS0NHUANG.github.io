    <h1 class="page_title">關於</h1>
    <p>腦容量太小，所以<a href="/2019/03/30/create-hexo-blog/">建一個部落格</a>記筆記。<br>第 N 個部落格，其他都醜不忍睹。</p>
<p>說法文但是不浪漫，西文、日文程度大概 A1 到 A2 間。<br>愛游泳、溜冰、跑步，能滑雪跳過 15 米跳台但有時落地雪板會噴掉。<br>愛棒球、桌球，欣賞一朗、柳承敏，自己只是愛打球的社區阿伯。<br>小時候喜歡到處跑去過一些神奇的地方。<br>喜歡彈吉他唱唱歌已經放棄死亡搖滾嘻哈的夢想。<br>聽音樂、看電影、讀一點書，很愛 Michael Jackson。<br>覺得老莊哲學是人類文明結晶。<br>在台北長大想當農夫。<br>愛打電動但打得很爛。</p>
<p>歡迎留言聊聊天 ^_^</p>
